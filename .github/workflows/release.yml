name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: factorio-mod-settings-converter
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: factorio-mod-settings-converter
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: factorio-mod-settings-converter
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: factorio-mod-settings-converter

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Install cross
      if: contains(matrix.target, 'linux') && matrix.target != 'x86_64-unknown-linux-gnu'
      run: cargo install cross
    - name: Build
      run: |
        if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
          cross build --release --target ${{ matrix.target }}
        else
          cargo build --release --target ${{ matrix.target }}
        fi
      shell: bash
    - name: Package
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
        cd dist
        tar -czvf ../${{ matrix.binary_name }}-${{ matrix.target }}.tar.gz *
      shell: bash
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.binary_name }}-${{ matrix.target }}.*
        asset_name: ${{ matrix.binary_name }}-${{ matrix.target }}
        tag: ${{ github.ref_name }}
        overwrite: true
        file_glob: true
